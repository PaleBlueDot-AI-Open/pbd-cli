project_name: pbd-cli

builds:
  # Prod version only
  - id: pbd-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
      - -X github.com/PaleBlueDot-AI-Open/pbd-cli/internal/config.env=prod
    main: .

archives:
  - id: pbd-cli
    builds:
      - pbd-cli
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums_{{ .Version }}.txt'
